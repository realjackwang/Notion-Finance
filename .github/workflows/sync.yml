name: Notion Finance Auto Sync

on:
  schedule:
    # 每天北京时间 22:00 执行 (UTC 时间 14:00)
    - cron: '0 14 * * *'
  
  # 允许在 GitHub 网页端手动点击按钮运行
  workflow_dispatch:

jobs:
  sync_and_calculate:
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v6
        
      - name: 配置 Python 环境
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          cache: 'pip' # 加入 pip 缓存，加快每天运行的速度
          
      - name: 安装依赖包
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: 运行同步脚本
        env:
          # 核心数据库配置
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          DATABASE_ID_ASSETS: ${{ secrets.DATABASE_ID_ASSETS }}
          DATABASE_ID_TRANSACTIONS: ${{ secrets.DATABASE_ID_TRANSACTIONS }}
          DATABASE_ID_HISTORY: ${{ secrets.DATABASE_ID_HISTORY }}
          DATABASE_ID_DCA_LOGS: ${{ secrets.DATABASE_ID_DCA_LOGS }}
          
          # 仪表盘块 ID 配置
          NOTION_BLOCK_TOTAL_ASSET_ID: ${{ secrets.NOTION_BLOCK_TOTAL_ASSET_ID }}
          NOTION_BLOCK_CUMULATIVE_PROFIT_ID: ${{ secrets.NOTION_BLOCK_CUMULATIVE_PROFIT_ID }}
          NOTION_BLOCK_DAILY_PROFIT_ID: ${{ secrets.NOTION_BLOCK_DAILY_PROFIT_ID }}
          NOTION_BLOCK_MAX_DRAWDOWN_ID: ${{ secrets.NOTION_BLOCK_MAX_DRAWDOWN_ID }}
          NOTION_BLOCK_ANNUAL_RETURN_ID: ${{ secrets.NOTION_BLOCK_ANNUAL_RETURN_ID }}
          
          # 招商银行鉴权配置
          CMB_AUTH_KEY: ${{ secrets.CMB_AUTH_KEY }}
          
        run: python main.py

  workflow-keepalive:
    if: github.event_name == ''
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - uses: liskin/gh-workflow-keepalive@v1